<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .toolbar { background: #333; padding: 10px; display: flex; align-items: center; gap: 10px; color: #fff; }
    #slider { flex: 1; height: 20px; cursor: pointer; }
    #container { flex: 1; position: relative; }
    img { max-width: 100%; }
    .cropper-point { display: none !important; }
    .cropper-point.point-nw { display: block !important; width: 16px; height: 16px; background-color: #FFEB3B !important; top: -24px !important; left: 0px !important; cursor: nwse-resize !important; border: 1px solid #000; z-index: 999; }
    .cropper-line, .cropper-dashed { border-color: #000 !important; }
  </style>
</head>
<body>
  <div class="toolbar">
    <input type="file" id="input" accept="image/*,.pdf">
    <input type="range" id="slider" min="-180" max="180" step="0.1" value="0">
    <button onclick="sendResult()" style="background:#c62828; color:white; padding: 5px 15px; cursor:pointer;">保存して閉じる</button>
  </div>
  <div id="container"><img id="image"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let cropper; const img = document.getElementById('image');
    
    document.getElementById('input').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.type === 'application/pdf') {
        const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        img.src = canvas.toDataURL();
      } else { img.src = URL.createObjectURL(file); }
      img.onload = () => {
        if(cropper) cropper.destroy();
        cropper = new Cropper(img, { viewMode: 1, dragMode: 'move', autoCropArea: 0.2, aspectRatio: NaN, guides: true });
      };
    };

    document.getElementById('slider').oninput = (e) => cropper.rotateTo(e.target.value);

    function sendResult() {
      const canvas = cropper.getCroppedCanvas();
      if (!canvas) { alert("切り抜き範囲がありません"); return; }
      
      // 親ウィンドウへデータを送る
      window.opener.postMessage({ type: 'SAVE_COMPLETE', blob: canvas.toDataURL('image/png') }, '*');
      
      // ユーザーに確認を表示して閉じる（ブロック回避）
      alert("保存を送信しました。このウィンドウを閉じます。");
      window.close();
    }
  </script>
</body>
</html>
